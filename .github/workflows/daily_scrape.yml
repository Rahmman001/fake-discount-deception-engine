name: Daily Price Scrape

# Runs every day at midnight UTC, and can also be triggered manually from
# the Actions tab in GitHub (handy for testing without waiting for cron).
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

# The default GITHUB_TOKEN is read-only unless we explicitly grant write
# access -- required for the "commit and push" step at the end.
permissions:
  contents: write

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraping + transform pipeline
        run: python run_pipeline.py

      - name: Commit and push updated parquet file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/historical_prices.parquet
          # If the pipeline produced no changes (e.g. every scrape failed
          # DQ checks today), skip the commit instead of failing the job.
          git diff --staged --quiet || git commit -m "chore: daily price snapshot $(date -u +'%Y-%m-%d')"
          git push
